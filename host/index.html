<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Different Dog Breeds</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5">
    <h1 class="text-center mb-4">🐶 Dog Breeds</h1>

    <div class="row">

      <!-- First dog -->
      <div class="col-md-6">
        <div class="card mb-4">
          <img src="https://placedog.net/400/250?id=2" class="card-img-top" alt="German Shepherd">
          <div class="card-body">
            <h5 class="card-title">German Shepherd</h5>
            <p class="card-text">Smart, loyal, and excellent working dogs.</p>
          </div>
        </div>
      </div>

      <!-- Second dog -->
      <div class="col-md-6">
        <div class="card mb-4">
          <img src="https://placedog.net/400/250?id=3" class="card-img-top" alt="Golden Retriever">
          <div class="card-body">
            <h5 class="card-title">Golden Retriever</h5>
            <p class="card-text">Gentle, intelligent, and great with kids.</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
